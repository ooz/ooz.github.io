name: Build Website

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@main

      - name: Install uv
        run: make install_uv

      - name: Configure Git
        run: |
          git config user.email "ooz@users.noreply.github.com"
          git config user.name "ooz"

      - name: Deploy
        run: make deploy
